# security monitoring microservice configuration
spring.application.name=security-monitoring-service
server.port=8081

# separate h2 file db from the ecommerce app
spring.datasource.url=jdbc:h2:file:../data/monitoring-events;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# jpa settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# h2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# async thread pool for event processing
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=200

# logging
logging.level.com.security.monitoring=INFO
