name: Security Tests

# ci pipeline for running the full security test suite headlessly
on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      # pull source code for the build
      - name: Checkout code
        uses: actions/checkout@v4

      # set java toolchain for maven builds
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      
      # use a mirror to avoid transient maven central access issues
      - name: Configure Maven Central mirror
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>central-mirror</id>
                <mirrorOf>central</mirrorOf>
                <url>https://repo1.maven.org/maven2</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      # install chrome for selenium tests
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      # build both microservices so the tests can run against them
      - name: Build microservices
        run: mvn -pl ecommerce-app,security-monitoring-service -DskipTests package

      # start the monitoring service first, then the ecommerce app
      - name: Start monitoring service
        run: |
          cd security-monitoring-service
          nohup mvn -DskipTests spring-boot:run > monitoring.log 2>&1 &
          echo $! > monitoring.pid
          for i in {1..20}; do
            if curl -fsS http://localhost:8081/api/analytics/health >/dev/null; then
              echo "Monitoring service is up"
              break
            fi
            sleep 2
          done

      # start the ecommerce app and wait until it responds
      - name: Start ecommerce app
        run: |
          cd ecommerce-app
          nohup mvn -DskipTests spring-boot:run -Dspring-boot.run.profiles=demo > app.log 2>&1 &
          echo $! > app.pid
          for i in {1..40}; do
            if curl -fsS http://localhost:8080 >/dev/null; then
              echo "Application is up"
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8080 >/dev/null

      # run the test suite in headless mode against localhost
      - name: Run security tests
        run: mvn -pl security-tests test -Dheadless=true -Dbrowser=chrome -DbaseUrl=http://localhost:8080

      # cleanup is always executed to avoid leaked processes
      - name: Stop microservices
        if: always()
        run: |
          if [ -f ecommerce-app/app.pid ]; then
            kill $(cat ecommerce-app/app.pid) || true
          fi
          if [ -f security-monitoring-service/monitoring.pid ]; then
            kill $(cat security-monitoring-service/monitoring.pid) || true
          fi
          pkill -f "spring-boot:run" || true

      # publish test artifacts for review
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-reports
          path: |
            security-tests/target/ExtentReport.html
            security-tests/target/surefire-reports
            security-tests/target/test-output
          if-no-files-found: ignore
          retention-days: 30
